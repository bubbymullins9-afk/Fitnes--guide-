<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Fitness Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>💪 My Fitness Tracker</h1>

  <div class="card">
    <h2>Daily Goals</h2>

    <label><input type="checkbox"> Workout</label><br>
    <label><input type="checkbox"> 10,000 Steps</label><br>
    <label><input type="checkbox"> Drink Water</label><br>
    <label><input type="checkbox"> Healthy Meals</label><br>
    <label><input type="checkbox"> Sleep 8–10 Hours</label>
  </div>

  <div class="card">
    <h2>Workout Plan</h2>
    <p>
      Mon: Squats, push-ups, lunges, plank<br>
      Tue: Cardio (walk/bike/sport)<br>
      Wed: Full body workout<br>
      Thu: Active day<br>
      Fri: Repeat Monday<br>
      Sat: Sport or walk<br>
      Sun: Rest
    </p>
  </div>

  <div class="card">
    <h2>Motivation</h2>
    <p>Small habits every day = big results over time. Keep going 💪</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
